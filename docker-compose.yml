services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: sensor_net
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  mqtt-broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sensor_net
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      MQTT_BROKER_URL: tcp://mqtt-broker:1883
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mqtt-broker

  frontend:
    build:
      context: ./sensor-net-frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
